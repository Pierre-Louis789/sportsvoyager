{% extends "base.html" %}

{% block content %}

<div class="row">
    <div class="col-md-6">
        {% if pack.image %}
            <img src="{{ pack.image.url }}" class="img-fluid rounded mb-4" alt="{{ pack.title }}">
        {% endif %}
    </div>

    <div class="col-md-6">
        <h1 class="fw-bold">{{ pack.title }}</h1>

        <p class="text-muted mb-1"><strong>Club:</strong> {{ pack.club }}</p>
        <p class="text-muted mb-3"><strong>League:</strong> {{ pack.league }}</p>

        <h3 class="text-primary fw-bold">£{{ pack.price }}</h3>

        <p class="mt-3">{{ pack.description }}</p>

        <a href="/" class="btn btn-outline-secondary mt-3">← Back to Packs</a>
    </div>
</div>

<hr class="my-5">

<h2 class="mb-3">Itinerary</h2>
<div class="bg-light p-4 rounded shadow-sm">
    <p class="mb-0" style="white-space: pre-line;">{{ pack.itinerary }}</p>
</div>

{% endblock %}
